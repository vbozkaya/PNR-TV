plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-parcelize'
    id 'com.google.dagger.hilt.android'
    id 'com.google.devtools.ksp'
    id 'com.google.gms.google-services'
    id 'org.jlleitschuh.gradle.ktlint'
    id 'jacoco'
}

// local.properties dosyasını oku
def localPropertiesFile = rootProject.file("local.properties")
def localProperties = new Properties()
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

android {
    namespace 'com.pnr.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.pnr.tv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
        testInstrumentationRunner "com.pnr.tv.HiltTestRunner"
        
        // TMDB API Key - local.properties'ten oku
        def tmdbApiKey = localProperties.getProperty("TMDB_API_KEY")
        if (tmdbApiKey == null || tmdbApiKey.isEmpty()) {
            throw new GradleException("TMDB_API_KEY bulunamadı! local.properties dosyasına 'TMDB_API_KEY=your_api_key_here' ekleyin.")
        }
        buildConfigField "String", "TMDB_API_KEY", "\"$tmdbApiKey\""
    }

    buildTypes {
        debug {
            testCoverageEnabled = true
            buildConfigField "boolean", "ENABLE_LOGGING", "true"
            buildConfigField "boolean", "IS_PRODUCTION", "false"
        }
        release {
            // ProGuard'ı aktif et - kod küçültme ve obfuscation için
            minifyEnabled true
            shrinkResources true  // Kullanılmayan resource'ları da kaldır
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
            buildConfigField "boolean", "IS_PRODUCTION", "true"
        }
    }

    testOptions {
        unitTests.all {
            jacoco {
                includeNoLocationClasses = true
                excludes = ['jdk.internal.*']
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    java {
        toolchain {
            languageVersion.set(JavaLanguageVersion.of(17))
        }
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding = true
        buildConfig = true
    }
}

